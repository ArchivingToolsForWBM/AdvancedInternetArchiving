<html>
	<head>
		<style>
			html {
			background-color: black;
			color: white;
			font-family: sans-serif;
			}
			
			table, th, td {
			border: 1px solid white;
			border-collapse: collapse;
			}
			
			span.NoLineBreak {
				white-space: nowrap;
			}
			input { font-family: monospace;}
			
			label, input[type='checkbox'], input[type='radio'] {
				cursor: pointer;
			}
		</style>
	</head>
	
	Example:<br>
	<textarea readonly style="white-space: pre; overflow-wrap: normal; overflow-x: scroll; background-color: #000000; color: #ffffff">
[
	{
		"Start": "2020-01-01 00:00:00 UTC",
		"End": "2020-01-01 00:00:10 UTC",
		"Text": "Test 1"
	},
	{
		"Start": "2020-01-01 00:00:20 UTC",
		"End": "2020-01-01 00:00:30 UTC",
		"Text": "Test 2"
	}
]
	</textarea><br>
	
	<label><input type="checkbox" id="AutoUpdate" checked>Auto Update</label><br>
	
	<textarea id="JSONInput" cols="100" rows="30" oninput="TextareaChanged(); AutoUpdate()" style="white-space: pre; overflow-wrap: normal; overflow-x: scroll;"></textarea><br>
	<span hidden id="InvalidJsonMessage" style="color: #ff0000"> Invalid JSON or JSON format!</span>
	
	<br>
	
	<span id="ZoomUI">Zoom: <input type="range" min="1" max="100000000000000" step="1" value="101900" id="GraphZoomLevel" oninput="AutoUpdate()" style="width: 800px "><kbd id="ZoomLevelDisplay"></kbd><br></span>
	Date and time (UTC): <input type="text" id="DateAndTime" size="25" onchange="CheckDateValid(); AutoUpdate()"><button onclick="JumpToEarliest(); AutoUpdate()">Earliest recorded</button><button onclick="JumpToLatest(); AutoUpdate()">Latest recorded</button><button onclick="InitalizeDate(); AutoUpdate()">Current date and time</button>
	
	<span hidden id="InvalidDateMessage" style="color: #ff0000"> Invalid date! Please enter in <kbd>YYYY-MM-DDTHH:mm:ss.sssZ</kbd> or any readable format.</span><br>
	<svg style="outline: 1px solid; overflow: hidden" id="DrawingSpace" class="Dragable"></svg><br>
	<kbd>Date of mouse position: <span id="MousePosToTime"></kbd>

<script>
//Settings
	const Setting_ZoomDenominator = 1000000000
	const Setting_MaxZoom = 20000000
	const Setting_IntervalDrawLimit = 200
	const Setting_SVGSpace_Width = 1500
	const Setting_SVGSpace_Height = 400
	const Setting_ZoomUI = false

//Don't touch
	let isTextareaChanged = false
	let invalidDateState = false
	
	let Saved_ListOfDated = []
	let Saved_EarliestRecordedMS = Infinity
	let Saved_LatestRecordedMS = -Infinity
	let DisplayedGraphTimeMS = 0
	let DisplayedGraphTimeMSOriginal = 0 //Only used when click-drag so it doesn't add by itself and accumulate.
	let GraphCurrentTimeDisplay = null
	
	
	document.getElementById("GraphZoomLevel").max = Setting_MaxZoom.toString(10)
	document.getElementById("DrawingSpace").style.width = Setting_SVGSpace_Width.toString(10) + "px"
	document.getElementById("DrawingSpace").style.height = Setting_SVGSpace_Height.toString(10) + "px"
	document.getElementById("ZoomUI").hidden = !Setting_ZoomUI
	//Click and hold, and move the mouse to obtain displacement from where it was clicked
		let DocBody = document.querySelector("body")
		let MouseDownClickPos = {
			x: 0,
			y: 0,
			moveByX: 0,
			moveByY: 0,
			PlacedState: false
		}
		let DragableMouseMovementElements = [...document.querySelectorAll("*.Dragable")]
		DragableMouseMovementElements.forEach((HTMLEle) => {
			HTMLEle.addEventListener("mousedown", (e) => {
				e.preventDefault()
				if (invalidDateState) {
					return
				}
				if (e.button != 0) {
					return
				}
				MouseDownClickPos.x = e.pageX
				MouseDownClickPos.y = e.pageY
				MouseDownClickPos.moveByX = e.pageX - MouseDownClickPos.x
				MouseDownClickPos.moveByY = e.pageY - MouseDownClickPos.y
				MouseDownClickPos.PlacedState = true
			})
		})

		document.addEventListener("mouseup", (e) => {
			MouseDownClickPos.PlacedState = false
		})
		DocBody.addEventListener("mousemove", (e) => {
			if (MouseDownClickPos.PlacedState) {
				MouseDownClickPos.moveByX = e.pageX - MouseDownClickPos.x
				MouseDownClickPos.moveByY = e.pageY - MouseDownClickPos.y
			}
		})
//Code below
	let SVGGraph = document.getElementById("DrawingSpace")
	SVGGraph.addEventListener("wheel", (e) => { //Scroll wheel to scroll/zoom the graph
		e.preventDefault()
		if (invalidDateState) {
			return
		}
		try {
			if (!e.ctrlKey) {
				DisplayedGraphTimeMS = DisplayedGraphTimeMS + Math.round(e.deltaY * Setting_ZoomDenominator / document.getElementById("GraphZoomLevel").value.toString(10))
					//^Normally, the position of the bars representing a period of time is multiplied by Scale then divided by Setting_ZoomDenominator to scale the
					// graph size, however, we want to make sure that the more we are zoomed in, the shorter the scroll distance on the time have been moved, so we
					// multiply by the reciprocal of that fraction.
				document.getElementById("DateAndTime").value = new Date(DisplayedGraphTimeMS).toISOString()
				MainCode()
			} else {
				let ZoomLevel = parseInt(document.getElementById("GraphZoomLevel").value)
				let ZoomRatio = ZoomLevel/Setting_ZoomDenominator
				let ZoomUnits = GetInterval(ZoomRatio).ZoomScrollIndex
	
				let ZoomLevelIndexValues = [1,22,263,11224,668448,20000000]
				let ZoomIndexTowards = ZoomUnits + Math.sign(e.deltaY*-1)
				if (ZoomIndexTowards < 0) {
					ZoomIndexTowards = 0
					return
				}
				if (ZoomIndexTowards > ZoomLevelIndexValues.length-1) {
					ZoomIndexTowards = ZoomLevelIndexValues.length-1
					return
				}
				
				let Target = e.currentTarget
				let Rect = Target.getBoundingClientRect();
				let MouseXPos = e.clientX - Rect.left;		//Mouse position relative to SVG
				let ToTimeMS = Math.round(CalculateXPixelToTimeMS(MouseXPos)) //Time the mouse is on (relative to epoch). Need to do this before zoom change to preserve the time position
				let MSBetweenDisplayedGraphTimeMSAndMouseXMS = ToTimeMS - DisplayedGraphTimeMS
				
				//let Debug_ToTimeMS_ISOString = new Date(ToTimeMS).toISOString()

				ZoomLevel = ZoomLevelIndexValues[ZoomIndexTowards]	//Adjust zoom
				document.getElementById("GraphZoomLevel").value = ZoomLevel.toString(10)
				
				let ToTimeMSPostZoom = Math.round(CalculateXPixelToTimeMS(MouseXPos))
				DisplayedGraphTimeMS = ToTimeMS - Math.round((MSBetweenDisplayedGraphTimeMSAndMouseXMS * parseInt(document.getElementById("GraphZoomLevel").value)/Setting_ZoomDenominator)) - (ToTimeMSPostZoom - DisplayedGraphTimeMS)
				document.getElementById("DateAndTime").value = new Date(DisplayedGraphTimeMS).toISOString()
				
				MainCode()
			}
		} catch (err) {document.getElementById("MousePosToTime").textContent = err}
	})
	SVGGraph.addEventListener("mousedown", (e) => {
		if (e.button != 0) {
			return
		}
		if (!MouseDownClickPos.PlacedState) {
			return
		}
		DisplayedGraphTimeMSOriginal = DisplayedGraphTimeMS //Keep original (don't add by itself on every mouse move)
		MainCode()
	})
	SVGGraph.addEventListener("mousemove", (e) => {
		if (!MouseDownClickPos.PlacedState) {
			return
		}
		DisplayedGraphTimeMS = DisplayedGraphTimeMSOriginal + Math.round(MouseDownClickPos.moveByX*-1 * Setting_ZoomDenominator / document.getElementById("GraphZoomLevel").value.toString(10))
		document.getElementById("DateAndTime").value = new Date(DisplayedGraphTimeMS).toISOString()
		MainCode()
	})
	document.getElementById("DrawingSpace").addEventListener("mousemove", (e) => {
		//based off of https://phuoc.ng/collection/html-dom/calculate-the-mouse-position-relative-to-an-element/
		if (invalidDateState) {
			document.getElementById("MousePosToTime").textContent = "Error"
			return
		}
		try {
			let Target = e.currentTarget
			let Rect = Target.getBoundingClientRect();
			let XPos = e.clientX - Rect.left;
			let ToTimeMS = Math.round(CalculateXPixelToTimeMS(XPos))
			document.getElementById("MousePosToTime").textContent = ISOString_to_YYYY_MM_DD_HH_MM_SS(new Date(ToTimeMS).toISOString())
		} catch (e) {}
	}, false)
	
	InitalizeDate()
	MainCode()
	let Interval_CurrentTimeDisplay = setInterval(GraphCurrentTime, 100)
	
	
	function GraphCurrentTime() {
		if (GraphCurrentTimeDisplay == null) {
			GraphCurrentTimeDisplay = createSVGElement("line")
		}
		let IntervalLineXPos = CalculateXPos(new Date(Date.now()).valueOf())
		GraphCurrentTimeDisplay.setAttribute("x1", IntervalLineXPos.toString(10))
		GraphCurrentTimeDisplay.setAttribute("x2", IntervalLineXPos.toString(10))
		GraphCurrentTimeDisplay.setAttribute("y1", "0")
		GraphCurrentTimeDisplay.setAttribute("y2", "100")
		GraphCurrentTimeDisplay.setAttribute("stroke", "#FFFF00")
		GraphCurrentTimeDisplay.setAttribute("id", "DontErase")
		GraphCurrentTimeDisplay.setAttribute("stroke-width", "3")
		document.getElementById("DrawingSpace").appendChild(GraphCurrentTimeDisplay)
		
	}
	function InitalizeDate() {
		let HourAgo = Date.now()
		let ISOString = new Date(HourAgo).toISOString()
		document.getElementById("DateAndTime").value = ISOString
		DisplayedGraphTimeMS = HourAgo.valueOf()
		invalidDateState = false
		document.getElementById("InvalidDateMessage").hidden = true
	}
	function AutoUpdate() {
		if (document.getElementById("AutoUpdate").checked) {
			MainCode()
		}
	}
	function TextareaChanged() {
		isTextareaChanged = true //If you edit the textarea, changed the "ignore fragment identifier", those are considered a change to the list.
	}
	function CheckDateValid() {
		let DateString = document.getElementById("DateAndTime").value
		let DateToCheck = new Date(DateString)
		invalidDateState = isNaN(DateToCheck.valueOf())
		document.getElementById("InvalidDateMessage").hidden = !invalidDateState
		if (!invalidDateState) {
			document.getElementById("DateAndTime").value = DateToCheck.toISOString()
			DisplayedGraphTimeMS = DateToCheck.valueOf()
		}
	}
	function JumpToEarliest() {
		if (Saved_EarliestRecordedMS === Infinity) {
			return
		}
		invalidDateState = false
		document.getElementById("DateAndTime").value = new Date(Saved_EarliestRecordedMS).toISOString()
		DisplayedGraphTimeMS = Saved_EarliestRecordedMS
		
	}
	function JumpToLatest() {
		if (Saved_LatestRecordedMS === -Infinity) {
			return
		}
		invalidDateState = false
		document.getElementById("DateAndTime").value = new Date(Saved_LatestRecordedMS).toISOString()
		DisplayedGraphTimeMS = Saved_LatestRecordedMS
	}
	function MainCode() {
		GraphCurrentTime()
		let OutputGraph = document.getElementById("DrawingSpace")
		let ClearableSVGElements = [...OutputGraph.querySelectorAll("*.Clearable")]
		ClearableSVGElements.forEach((SVGEle) => {
			OutputGraph.removeChild(SVGEle)
		})
		let InputJSONTimelineString = document.getElementById("JSONInput").value
		let EarliestRecordedMS = Infinity
		let LatestRecordedMS = -Infinity
		let ListOfDatedThings = []
		let ZoomLevel = parseInt(document.getElementById("GraphZoomLevel").value)
		if (invalidDateState) {
			return
		} else {
			document.getElementById("InvalidDateMessage").hidden = true
		}
		if (isTextareaChanged) { //Process any new changes in the input textarea
			if (!isJsonString(InputJSONTimelineString)) {
				document.getElementById("InvalidJsonMessage").hidden = false
				return
			}
			try {
				ListOfDatedThings = [...JSON.parse(InputJSONTimelineString)] //Test if the outermost object is array
				ListOfDatedThings = ListOfDatedThings.map((ArrEle) => {
					let StartingTimeMS = new Date(ArrEle.Start).valueOf()
					if (EarliestRecordedMS > StartingTimeMS) {
						EarliestRecordedMS = StartingTimeMS
					}
					let EndingTimeMS =  new Date(ArrEle.End).valueOf()
					if (LatestRecordedMS < EndingTimeMS) {
						LatestRecordedMS = EndingTimeMS
					}
					return {
						Original: ArrEle,
						TimeMS: {
							StartingTimeMS: StartingTimeMS,
							EndingTimeMS: EndingTimeMS
						}
					}
				})
				ListOfDatedThings.sort((a, b) => a.TimeMS.StartingTimeMS - b.TimeMS.StartingTimeMS) //We sort so that we have consistency that any "later" time overlaps the "earlier"
			} catch (e) {
				document.getElementById("InvalidJsonMessage").hidden = false
				return
			}
			Saved_EarliestRecordedMS = EarliestRecordedMS
			Saved_LatestRecordedMS = LatestRecordedMS
			Saved_ListOfDated = ListOfDatedThings //Save to list
		} else {
			ListOfDatedThings = Saved_ListOfDated //Load list
		}
		//Display intervals of time (month, day, hours, minutes...)
		//The for loop's "i" value acts as a failsafe to prevent huge loops
			let DateIntervalObject = GetInterval(ZoomLevel/Setting_ZoomDenominator)
			
			document.getElementById("ZoomLevelDisplay").textContent = ZoomLevel.toString(10) + "/" + Setting_ZoomDenominator.toString(10) + "x (" + (ZoomLevel/Setting_ZoomDenominator).toFixed(10) + "x), Interval type: " + DateIntervalObject.IncrementName
			
			for (let i = 0; i < Setting_IntervalDrawLimit; i++) {
				//Get position, terminate if we got to the right side of graph
					let IntervalLineXPos = CalculateXPos(DateIntervalObject.DateInterval.valueOf())
					if (IntervalLineXPos > 1500) { //If last line outside the chart, end the loop
						break
					}
				//Place a vertical line
					let IntervalLine = createSVGElement("line")
					IntervalLine.setAttribute("x1", IntervalLineXPos.toString(10))
					IntervalLine.setAttribute("x2", IntervalLineXPos.toString(10))
					IntervalLine.setAttribute("y1", "0")
					IntervalLine.setAttribute("y2", "100")
					IntervalLine.setAttribute("stroke", "#ffffff")
					IntervalLine.classList.add("Clearable")
					OutputGraph.appendChild(IntervalLine)
				//Add text
					let TextTimestamp = createSVGElement("text")
					switch (DateIntervalObject.IncrementName) {
						case "Year":
							TextTimestamp.appendChild(document.createTextNode((DateIntervalObject.DateInterval.getUTCFullYear()).toString(10)))
							break
						case "Month":
							TextTimestamp.appendChild(document.createTextNode((DateIntervalObject.DateInterval.getUTCFullYear()).toString(10) + "-" + (DateIntervalObject.DateInterval.getUTCMonth()+1).toString(10).padStart(2, "0")))
							break
						case "Day":
							TextTimestamp.appendChild(document.createTextNode((DateIntervalObject.DateInterval.getUTCFullYear()).toString(10) + "-" + (DateIntervalObject.DateInterval.getUTCMonth()+1).toString(10).padStart(2, "0") + "-" + (DateIntervalObject.DateInterval.getUTCDate()).toString(10).padStart(2, "0")))
							break
						case "Hours":
							{
								let Hours = DateIntervalObject.DateInterval.getUTCHours()
								let Text = ""
								if (Hours == 0) {
									Text += (DateIntervalObject.DateInterval.getUTCFullYear()).toString(10) + "-" + (DateIntervalObject.DateInterval.getUTCMonth()+1).toString(10).padStart(2, "0") + "-" + (DateIntervalObject.DateInterval.getUTCDate()).toString(10).padStart(2, "0") + " "
								}
								Text += Hours.toString(10).padStart(2, "0") + ":00"
								TextTimestamp.appendChild(document.createTextNode(Text))
							}
							break
						case "Minutes":
							{
								let Minutes = DateIntervalObject.DateInterval.getUTCMinutes()
								let Text = ""
								if (Minutes == 0) {
									Text += (DateIntervalObject.DateInterval.getUTCFullYear()).toString(10) + "-" + (DateIntervalObject.DateInterval.getUTCMonth()+1).toString(10).padStart(2, "0") + "-" + (DateIntervalObject.DateInterval.getUTCDate()).toString(10).padStart(2, "0") + " " + (DateIntervalObject.DateInterval.getUTCHours()).toString(10).padStart(2, "0") + ":"
								}
								Text += Minutes.toString(10).padStart(2, "0") + ":00"
								TextTimestamp.appendChild(document.createTextNode(Text))
							}
							break
						case "Seconds":
							{
								let Seconds = DateIntervalObject.DateInterval.getUTCSeconds()
								let Text = ""
								if (Seconds == 0) {
									Text += (DateIntervalObject.DateInterval.getUTCFullYear()).toString(10) + "-" + (DateIntervalObject.DateInterval.getUTCMonth()+1).toString(10).padStart(2, "0") + "-" + (DateIntervalObject.DateInterval.getUTCDate()).toString(10).padStart(2, "0") + " " + (DateIntervalObject.DateInterval.getUTCHours()).toString(10).padStart(2, "0") + ":" + (DateIntervalObject.DateInterval.getUTCMinutes()).toString(10).padStart(2, "0") + ":"
								}
								Text += Seconds.toString(10).padStart(2, "0")
								TextTimestamp.appendChild(document.createTextNode(Text))
							}
					}
					//TextTimestamp.appendChild(document.createTextNode(ISOString_to_YYYY_MM_DD_HH_MM_SS(DateIntervalObject.DateInterval.toISOString())))
					TextTimestamp.setAttribute("text-anchor", "start")
					TextTimestamp.setAttribute("alignment-baseline", "middle")
					TextTimestamp.setAttribute("stroke", "#ffffff")
					TextTimestamp.setAttribute("font-weight", "lighter")
					TextTimestamp.setAttribute("transform", "translate(" + (IntervalLineXPos).toString(10) + ", 100)" + "rotate(90)")
					TextTimestamp.setAttribute("font-family", "monospace")
					TextTimestamp.classList.add("Clearable")
					OutputGraph.appendChild(TextTimestamp)
				//Next interval
					DateIntervalObject.NextInterval()

			}
		//Place bars indicating duration based on the items provided
			document.getElementById("InvalidJsonMessage").hidden = true
			ListOfDatedThings.forEach((ArrEle) => {
				let Rectangle = createSVGElement("rect")
				let Rectangle_LeftPos = clamp(CalculateXPos(ArrEle.TimeMS.StartingTimeMS), -10, Setting_SVGSpace_Width+10) //This prevents I would think a floating point precision error with the width of the bar when zoomed in with long
				let Rectangle_RightPos = clamp(CalculateXPos(ArrEle.TimeMS.EndingTimeMS), -10, Setting_SVGSpace_Width+10)  //duration (e.g. 10 years long with a zoom level of seconds). Clamped to 10px off the graph so rounded corners are not shown when extended off
				
				Rectangle.setAttribute("x", Rectangle_LeftPos.toString(10))
				Rectangle.setAttribute("y", "10")
				Rectangle.setAttribute("width", (Rectangle_RightPos-Rectangle_LeftPos).toString(10))
				Rectangle.setAttribute("height", "10")
				Rectangle.setAttribute("fill", "#808080")
				Rectangle.setAttribute("rx", "5")
				Rectangle.setAttribute("ry", "5")
				Rectangle.classList.add("Clearable")
				let Title = createSVGElement("title")
				Title.appendChild(document.createTextNode(JSON.stringify(ArrEle.Original, null, " ")))
				Rectangle.appendChild(Title)
				OutputGraph.appendChild(Rectangle)
			})
	}
	function isJsonString(str) {
		//https://stackoverflow.com/questions/3710204/how-to-check-if-a-string-is-a-valid-json-string
		try {
			JSON.parse(str);
		} catch (e) {
			return false;
		}
		return true;
	}
	function clamp(number, min, max) {
		return Math.max(min, Math.min(number, max));
	}
	
	function createSVGElement(tag) { //https://stackoverflow.com/questions/57894500/why-is-it-necessary-to-use-document-createelementns-when-adding-svg-tags-to
		return document.createElementNS('http://www.w3.org/2000/svg', tag)
	}
	function CalculateXPos(TimeMS) {
		//(TimeMS - TimeScroll) * Zoom/Setting_ZoomDenominator
		return (TimeMS - DisplayedGraphTimeMS) * parseInt(document.getElementById("GraphZoomLevel").value) / Setting_ZoomDenominator
	}
	function CalculateXPixelToTimeMS(XPositionOnGraph) {
		//Inverse of above function
		return DisplayedGraphTimeMS+((XPositionOnGraph * Setting_ZoomDenominator))/parseInt(document.getElementById("GraphZoomLevel").value)
		
	}
	function ISOString_to_YYYY_MM_DD_HH_MM_SS(ISOString) {
		//YYYY-MM-DDTHH:mm:ss.sssZ or ±YYYYYY-MM-DDTHH:mm:ss.sssZ
		return ISOString.replace("T", " ").replace(/\.\d{3}Z$/, "") + " UTC"
	}
	function GetInterval(ZoomRatio) {
		let DateInterval = new Date(DisplayedGraphTimeMS)
		let ReturnObject = {
			DateInterval: DateInterval
		}
		if (ZoomRatio < 0.0000000150) { //Year increment
			DateInterval.setUTCMonth(0)
			DateInterval.setUTCDate(1)
			DateInterval.setUTCHours(0)
			DateInterval.setUTCMinutes(0)
			DateInterval.setUTCSeconds(0)
			DateInterval.setUTCMilliseconds(0)
			ReturnObject.NextInterval = function() {
				DateInterval.setUTCFullYear(DateInterval.getUTCFullYear()+1)
			}
			ReturnObject.IncrementName = "Year"
			ReturnObject.ZoomScrollIndex = 0
			
		} else if (ZoomRatio < 0.0000002000) { //Month increment
			DateInterval.setUTCDate(1)
			DateInterval.setUTCHours(0)
			DateInterval.setUTCMinutes(0)
			DateInterval.setUTCSeconds(0)
			DateInterval.setUTCMilliseconds(0)
			ReturnObject.NextInterval = function() {
				DateInterval.setUTCMonth(DateInterval.getUTCMonth()+1)
			}
			ReturnObject.IncrementName = "Month"
			ReturnObject.ZoomScrollIndex = 1
		} else if (ZoomRatio < 0.0000064000) { //Day
			DateInterval.setUTCHours(0)
			DateInterval.setUTCMinutes(0)
			DateInterval.setUTCSeconds(0)
			DateInterval.setUTCMilliseconds(0)
			ReturnObject.NextInterval = function() {
				DateInterval.setUTCDate(DateInterval.getUTCDate()+1)
			}
			ReturnObject.IncrementName = "Day"
			ReturnObject.ZoomScrollIndex = 2
		} else if (ZoomRatio < 0.0002000000) { //Hours
			DateInterval.setUTCMinutes(0)
			DateInterval.setUTCSeconds(0)
			DateInterval.setUTCMilliseconds(0)
			ReturnObject.NextInterval = function() {
				DateInterval.setUTCHours(DateInterval.getUTCHours()+1)
			}
			ReturnObject.IncrementName = "Hours"
			ReturnObject.ZoomScrollIndex = 3
		} else if (ZoomRatio < 0.0084000010) {//Minutes
			DateInterval.setUTCSeconds(0)
			DateInterval.setUTCMilliseconds(0)
			ReturnObject.NextInterval = function() {
				DateInterval.setUTCMinutes(DateInterval.getUTCMinutes()+1)
			}
			ReturnObject.IncrementName = "Minutes"
			ReturnObject.ZoomScrollIndex = 4
		} else {
			DateInterval.setUTCMilliseconds(0)
			ReturnObject.NextInterval = function() {
				DateInterval.setUTCSeconds(DateInterval.getUTCSeconds()+1)
			}
			ReturnObject.IncrementName = "Seconds"
			ReturnObject.ZoomScrollIndex = 5
		}
		return ReturnObject
	}

</script>
